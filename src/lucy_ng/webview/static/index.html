<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>lucy-ng webview</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                 Helvetica, Arial, sans-serif;
    font-size: 14px;
    background: #f8f9fa;
    color: #212529;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ---- Status bar ---- */
  #status-bar {
    background: #fff;
    border-bottom: 1px solid #dee2e6;
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
    min-height: 40px;
  }
  #status-bar .label {
    font-weight: 600;
    color: #495057;
  }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 600;
  }
  .badge-waiting   { background: #e9ecef; color: #6c757d; }
  .badge-running   { background: #d1ecf1; color: #0c5460; }
  .badge-complete  { background: #d4edda; color: #155724; }
  .badge-error     { background: #f8d7da; color: #721c24; }
  #status-state   { font-size: 13px; }
  #status-iter    { font-size: 13px; }
  #status-phase   { font-size: 13px; font-style: italic; color: #6c757d; }
  #status-elapsed { font-size: 13px; }
  #refresh-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #adb5bd; margin-left: auto;
    transition: background 0.3s;
  }
  #refresh-dot.active { background: #28a745; }

  /* ---- Main layout ---- */
  #main {
    display: flex;
    flex: 1;
    gap: 12px;
    padding: 12px;
    overflow: hidden;
    min-height: 0;
  }

  /* ---- Structure grid ---- */
  #structure-panel {
    flex: 1 1 0;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  #structure-panel h2 {
    font-size: 13px;
    font-weight: 600;
    color: #495057;
    padding-bottom: 4px;
    border-bottom: 1px solid #dee2e6;
  }
  #structure-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    overflow-y: auto;
  }
  .tile {
    background: #fff;
    border: 1px solid #dee2e6;
    border-radius: 6px;
    padding: 6px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    width: 160px;
  }
  .tile img {
    width: 148px;
    height: 148px;
    object-fit: contain;
    background: #f8f9fa;
    border-radius: 4px;
  }
  .tile-label {
    font-size: 11px;
    color: #495057;
    text-align: center;
    line-height: 1.4;
    word-break: break-all;
  }
  .tile-rank   { font-weight: 700; color: #212529; }
  .tile-quality { color: #6c757d; }
  #structure-hint {
    font-size: 12px;
    color: #6c757d;
    padding: 4px 0;
  }
  #structure-waiting {
    font-size: 13px;
    color: #6c757d;
    padding: 16px 0;
  }

  /* ---- Log panel ---- */
  #log-panel-wrapper {
    flex: 1 1 0;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  #log-panel-wrapper h2 {
    font-size: 13px;
    font-weight: 600;
    color: #495057;
    padding-bottom: 4px;
    border-bottom: 1px solid #dee2e6;
    flex-shrink: 0;
  }
  #log-panel {
    flex: 1;
    background: #fff;
    border: 1px solid #dee2e6;
    border-radius: 6px;
    padding: 10px 12px;
    overflow-y: scroll;
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    font-size: 12px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
    color: #212529;
    min-height: 200px;
    max-height: calc(100vh - 120px);
  }

  /* ---- Responsive: narrow windows collapse to stacked ---- */
  @media (max-width: 700px) {
    #main { flex-direction: column; }
    #log-panel { max-height: 300px; }
  }
</style>
</head>
<body>

<!-- Status bar -->
<div id="status-bar">
  <span class="label">lucy-ng</span>
  <span id="status-state"><span class="badge badge-waiting">waiting</span></span>
  <span id="status-iter"></span>
  <span id="status-phase"></span>
  <span id="status-elapsed"></span>
  <span id="refresh-dot" title="Last refresh"></span>
</div>

<!-- Main two-column layout -->
<div id="main">

  <!-- Structure grid (left) -->
  <div id="structure-panel">
    <h2>Candidate Structures</h2>
    <div id="structure-grid">
      <div id="structure-waiting">Waiting for candidates...</div>
    </div>
    <div id="structure-hint"></div>
  </div>

  <!-- Log panel (right) -->
  <div id="log-panel-wrapper">
    <h2>Run Log</h2>
    <pre id="log-panel">Waiting for log data...</pre>
  </div>

</div>

<script src="/webview.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>lucy-ng webview</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                 Helvetica, Arial, sans-serif;
    font-size: 14px;
    background: #f8f9fa;
    color: #212529;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ---- Status bar ---- */
  #status-bar {
    background: #fff;
    border-bottom: 1px solid #dee2e6;
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
    min-height: 40px;
  }
  #status-bar .label {
    font-weight: 600;
    color: #495057;
  }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 600;
  }
  .badge-waiting   { background: #e9ecef; color: #6c757d; }
  .badge-running   { background: #d1ecf1; color: #0c5460; }
  .badge-complete  { background: #d4edda; color: #155724; }
  .badge-error     { background: #f8d7da; color: #721c24; }
  #status-state   { font-size: 13px; }
  #status-iter    { font-size: 13px; }
  #status-phase   { font-size: 13px; font-style: italic; color: #6c757d; }
  #status-elapsed { font-size: 13px; }
  #refresh-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #adb5bd; margin-left: auto;
    transition: background 0.3s;
  }
  #refresh-dot.active { background: #28a745; }

  /* ---- Main layout ---- */
  #main {
    display: flex;
    flex: 1;
    gap: 12px;
    padding: 12px;
    overflow: hidden;
    min-height: 0;
  }

  /* ---- Structure grid ---- */
  #structure-panel {
    flex: 1 1 0;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  #structure-panel h2 {
    font-size: 13px;
    font-weight: 600;
    color: #495057;
    padding-bottom: 4px;
    border-bottom: 1px solid #dee2e6;
  }
  #structure-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    overflow-y: auto;
  }
  .tile {
    background: #fff;
    border: 1px solid #dee2e6;
    border-radius: 6px;
    padding: 6px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    width: 160px;
  }
  .tile img {
    width: 148px;
    height: 148px;
    object-fit: contain;
    background: #f8f9fa;
    border-radius: 4px;
  }
  .tile-label {
    font-size: 11px;
    color: #495057;
    text-align: center;
    line-height: 1.4;
    word-break: break-all;
  }
  .tile-rank   { font-weight: 700; color: #212529; }
  .tile-quality { color: #6c757d; }
  #structure-hint {
    font-size: 12px;
    color: #6c757d;
    padding: 4px 0;
  }
  #structure-waiting {
    font-size: 13px;
    color: #6c757d;
    padding: 16px 0;
  }

  /* ---- Log panel ---- */
  #log-panel-wrapper {
    flex: 1 1 0;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  /* ---- Tab bar ---- */
  #tab-bar {
    display: flex;
    gap: 4px;
    border-bottom: 1px solid #dee2e6;
    flex-shrink: 0;
  }
  #tab-bar button {
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 600;
    color: #6c757d;
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
  }
  #tab-bar button:hover {
    color: #495057;
  }
  #tab-bar button.active {
    color: #212529;
    border-bottom-color: #212529;
  }
  #tab-bar button:focus-visible {
    outline: 2px solid #0c5460;
    outline-offset: 2px;
  }

  /* ---- Tab panels (shared box model) ---- */
  [data-panel] {
    display: none;
    flex: 1;
    background: #fff;
    border: 1px solid #dee2e6;
    border-radius: 6px;
    padding: 10px 12px;
    overflow-y: scroll;
    color: #212529;
    min-height: 200px;
    max-height: calc(100vh - 156px);
  }
  [data-panel="log"] {
    display: block;
  }
  [data-panel].placeholder {
    font-size: 13px;
    color: #6c757d;
    padding: 16px 0;
    text-align: center;
  }

  /* ---- Markdown-rendered run log ---- */
  #log-panel h1 {
    font-size: 16px;
    font-weight: 600;
    line-height: 1.2;
    color: #212529;
    margin: 16px 0 8px;
  }
  #log-panel h1:first-child {
    margin-top: 0;
  }
  #log-panel h2 {
    font-size: 14px;
    font-weight: 600;
    line-height: 1.2;
    color: #212529;
    margin: 16px 0 8px;
  }
  #log-panel h3 {
    font-size: 13px;
    font-weight: 600;
    line-height: 1.2;
    color: #495057;
    margin: 12px 0 4px;
  }
  #log-panel p {
    font-size: 12px;
    color: #212529;
    line-height: 1.6;
    margin: 4px 0;
  }
  #log-panel strong {
    font-weight: 600;
    color: #212529;
  }
  #log-panel code {
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    font-size: 12px;
    background: #f8f9fa;
    padding: 0 4px;
    border-radius: 4px;
    color: #212529;
  }
  #log-panel pre {
    background: #f8f9fa;
    border: 1px solid #dee2e6;
    border-radius: 6px;
    padding: 8px 12px;
    overflow-x: auto;
    margin: 8px 0;
  }
  #log-panel pre code {
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    font-size: 12px;
    line-height: 1.6;
    white-space: pre;
    background: transparent;
    padding: 0;
    border-radius: 0;
  }
  #log-panel hr {
    border: none;
    border-top: 1px solid #dee2e6;
    margin: 16px 0;
  }
  #log-panel table {
    border-collapse: collapse;
    width: 100%;
    font-size: 12px;
    margin: 8px 0;
  }
  #log-panel th {
    background: #f8f9fa;
    color: #495057;
    font-weight: 600;
    text-align: left;
    padding: 4px 8px;
    border: 1px solid #dee2e6;
  }
  #log-panel td {
    padding: 4px 8px;
    border: 1px solid #dee2e6;
    color: #212529;
  }
  #log-panel ul {
    margin: 4px 0 4px 20px;
  }
  #log-panel li {
    font-size: 12px;
    color: #212529;
    line-height: 1.6;
  }

  /* ---- Responsive: narrow windows collapse to stacked ---- */
  @media (max-width: 700px) {
    #main { flex-direction: column; }
    [data-panel] { max-height: 300px; }
  }
</style>
</head>
<body>

<!-- Status bar -->
<div id="status-bar">
  <span class="label">lucy-ng</span>
  <span id="status-state"><span class="badge badge-waiting">waiting</span></span>
  <span id="status-iter"></span>
  <span id="status-phase"></span>
  <span id="status-elapsed"></span>
  <span id="refresh-dot" title="Last refresh"></span>
</div>

<!-- Main two-column layout -->
<div id="main">

  <!-- Structure grid (left) -->
  <div id="structure-panel">
    <h2>Candidate Structures</h2>
    <div id="structure-grid">
      <div id="structure-waiting">Waiting for candidates...</div>
    </div>
    <div id="structure-hint"></div>
  </div>

  <!-- Log panel (right) -->
  <div id="log-panel-wrapper">
    <div id="tab-bar">
      <button data-tab="log">Run Log</button>
      <button data-tab="spectra-1d">1D Spectra</button>
      <button data-tab="spectra-2d">2D Spectra</button>
      <button data-tab="tables">Tables</button>
    </div>
    <div id="log-panel" data-panel="log">Waiting for log data...</div>
    <div class="placeholder" data-panel="spectra-1d">1D Spectra — coming in Phase 95</div>
    <div class="placeholder" data-panel="spectra-2d">2D Spectra — coming in Phase 96</div>
    <div class="placeholder" data-panel="tables">Tables — coming in Phase 94</div>
  </div>

</div>

<script src="/webview.js"></script>
</body>
</html>
